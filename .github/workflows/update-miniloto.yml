name: Update Mini Loto CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "26 20 * * 2"
      timezone: "Asia/Tokyo"
    - cron: "51 20 * * 2"
      timezone: "Asia/Tokyo"
    - cron: "6 3 * * 3"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

jobs:
  update-miniloto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run updater
        run: npm run update:miniloto

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniloto-history.csv lottery-meta.json
          git commit -m "update: miniloto-history.csv and lottery-meta.json"
          git push
