name: Update Loto7 CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * 2,5"

permissions:
  contents: write

jobs:
  update-loto7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run updater
        run: npm run update:loto7

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loto7-history.csv
          git commit -m "update: loto7-history.csv"
          git push
