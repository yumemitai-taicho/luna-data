name: Update Loto6 CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * 1"
    - cron: "52 11 * * 1"
    - cron: "15 18 * * 1"
    - cron: "25 11 * * 4"
    - cron: "50 11 * * 4"
    - cron: "11 18 * * 4"

permissions:
  contents: write

jobs:
  update-loto6:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run updater
        run: npm run update:loto6

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loto6-history.csv lottery-meta.json
          git commit -m "update: loto6-history.csv and lottery-meta.json"
          git push
